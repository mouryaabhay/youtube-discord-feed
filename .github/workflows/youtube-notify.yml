name: YouTube New Video Notifier

on:
  # Runs every 10 hours (00:00, 10:00, 20:00 UTC). GitHub Actions requires this
  # to be a literal cron string here — it can't be pulled from src/configs/config.js.
  # All other configurable values live in that file instead.
  schedule:
    - cron: "0 */10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: youtube-notify

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Log trigger time (UTC)
        run: |
          echo "Triggered at UTC: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Event: ${{ github.event_name }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check YouTube channels and notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node ./src/webhookYoutubeRunner.js

      - name: Commit updated video state
        run: |
          git add data/

          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update last seen video state"
          git push
